name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # 确保这里是你的主分支名，通常是 main 或 master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # 使用 Node 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci # 安装依赖（相当于 npm install）
        
      - name: Build
        run: npm run build # 打包项目
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite 默认打包输出到 dist 文件夹

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
